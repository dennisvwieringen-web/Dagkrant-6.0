name: De Dagkrant - Nieuwsbundel

# ─────────────────────────────────────────────────────────────────────────────
# BEZORGING OM 16:00 CEST — DRAAIT NU LOKAAL OP DE PC VAN DENNIS
#
# PRIMAIRE TRIGGER: een Windows Taakplanner-taak ("Dagkrant-1600") op de pc van
# Dennis draait om 16:00 op ma/wo/do/vr het script run_dagkrant.ps1, dat de
# pijplijn rechtstreeks lokaal uitvoert (zie run_dagkrant.ps1 in de repo-root).
# Reden: GitHub's `schedule`-cron stelt runs vaak uren uit (geobserveerd: 18:40),
# en de eerdere externe cron-dienst (cron-job.org) viel uit. De lokale Taakplanner
# is stipt en heeft geen GitHub-wachtrij of externe dienst nodig. Voorwaarde: de
# pc staat om 16:00 aan + ingelogd — wat het geval is, want de krant wordt op het
# werk geprint.
#
# DE `schedule`-CRON IS BEWUST UITGESCHAKELD: anders zou GitHub later op de dag
# (~17:00 CEST) een TWEEDE editie sturen bovenop de lokale 16:00-run. De lokale
# run kan de Actions-cache-markering niet zien, dus de enige veilige manier om
# dubbel-verzending te voorkomen is de cloud-trigger uitzetten.
#
# `workflow_dispatch` BLIJFT staan als handmatige noodknop: draait de pc een keer
# niet, dan kun je de editie alsnog vanuit GitHub → Actions → "Run workflow"
# starten. De dagmarkering-cache hieronder voorkomt dan nog steeds dubbele
# verzending tussen meerdere cloud-runs onderling.
# ─────────────────────────────────────────────────────────────────────────────

on:
  # schedule:  # UITGESCHAKELD — zie toelichting hierboven. Lokale Taakplanner is nu de stipte 16:00-trigger.
  #   - cron: '0 15 * * 1,3,4,5'
  workflow_dispatch:  # ← handmatige noodknop (bv. als de pc een keer uit stond)

concurrency:
  group: dagkrant-edition
  cancel-in-progress: false

jobs:
  generate-dagkrant:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bepaal datum van vandaag (Europe/Amsterdam)
        id: date
        run: echo "today=$(TZ='Europe/Amsterdam' date +%F)" >> "$GITHUB_OUTPUT"

      - name: Herstel dagmarkering (al verstuurd vandaag?)
        id: marker
        uses: actions/cache/restore@v4
        with:
          path: .sent-marker
          key: dagkrant-sent-${{ steps.date.outputs.today }}

      - name: Set up Python
        if: steps.marker.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        if: steps.marker.outputs.cache-hit != 'true'
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        if: steps.marker.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Playwright system dependencies
        if: steps.marker.outputs.cache-hit != 'true'
        run: playwright install-deps chromium

      - name: Install Playwright browser (skip on cache hit)
        if: steps.marker.outputs.cache-hit != 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium

      - name: Run De Dagkrant
        if: steps.marker.outputs.cache-hit != 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TARGET_EMAIL: ${{ secrets.TARGET_EMAIL }}
          KINDLE_EMAIL: ${{ secrets.KINDLE_EMAIL }}
          SMTP_SERVER: smtp.gmail.com
          SMTP_PORT: '587'
        run: cd src && python main.py

      # Markeer pas NA een geslaagde verzending. Faalt de run, dan blijft de
      # markering uit en kan een volgende trigger het opnieuw proberen.
      - name: Schrijf dagmarkering
        if: steps.marker.outputs.cache-hit != 'true' && success()
        run: date > .sent-marker

      - name: Bewaar dagmarkering
        if: steps.marker.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: .sent-marker
          key: dagkrant-sent-${{ steps.date.outputs.today }}

      - name: Al verstuurd vandaag — overgeslagen
        if: steps.marker.outputs.cache-hit == 'true'
        run: echo "Editie van ${{ steps.date.outputs.today }} is vandaag al verstuurd. Run overgeslagen."
