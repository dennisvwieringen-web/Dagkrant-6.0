name: De Dagkrant - Nieuwsbundel

# ─────────────────────────────────────────────────────────────────────────────
# BEZORGING OM 16:00 CEST
#
# PRIMAIRE TRIGGER: een Windows Taakplanner-taak ("Dagkrant-1600") op de pc van
# Dennis roept om 16:00 (ma/wo/do/vr) via run_dagkrant.ps1 de GitHub-API
# `workflow_dispatch` aan. Die start binnen seconden — GEEN GitHub-wachtrij — en
# de krant wordt vervolgens HIER IN DE CLOUD opgehaald, vertaald, gerenderd en
# gemaild. De pijplijn kan NIET lokaal draaien: dat (werk)netwerk blokkeert de
# mailpoorten (IMAP 993 / SMTP 587); alleen HTTPS (443) werkt, genoeg om deze
# cloud-run aan te sturen. Authenticatie hergebruikt het token uit Git Credential
# Manager (geen aparte PAT). Voorwaarde: pc aan + ingelogd om 16:00 — geldt, want
# de krant wordt op het werk geprint.
#
# ACHTERVANG: de `schedule`-cron hieronder. GitHub draait scheduled-cron op
# best-effort basis en stelt 'm vaak uren uit (geobserveerd: 18:33 CEST), dus
# dit is BEWUST een late vangnet voor dagen dat de pc om 16:00 uit stond.
#
# GEEN DUBBELE VERZENDING: de dagmarkering in de Actions-cache (zie hieronder)
# zorgt dat alleen de EERSTE geslaagde run van de dag verstuurt. Op een normale
# dag verstuurt de 16:00-dispatch en zet de markering; de late `schedule`-cron
# ziet de cache-hit en slaat alles over. Beide triggers draaien dezelfde
# workflow, dus de cache geldt voor allebei.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # ACHTERVANG — bewust laat (~17:00 CEST zomertijd). De stipte 16:00-trigger
    # komt van de lokale Taakplanner via workflow_dispatch. Wintertijd (CET):
    # zet dan op '0 16 * * 1,3,4,5'.
    - cron: '0 15 * * 1,3,4,5'
  workflow_dispatch:  # ← primaire trigger (lokale Taakplanner) + handmatig

concurrency:
  group: dagkrant-edition
  cancel-in-progress: false

jobs:
  generate-dagkrant:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bepaal datum van vandaag (Europe/Amsterdam)
        id: date
        run: echo "today=$(TZ='Europe/Amsterdam' date +%F)" >> "$GITHUB_OUTPUT"

      - name: Herstel dagmarkering (al verstuurd vandaag?)
        id: marker
        uses: actions/cache/restore@v4
        with:
          path: .sent-marker
          key: dagkrant-sent-${{ steps.date.outputs.today }}

      - name: Set up Python
        if: steps.marker.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        if: steps.marker.outputs.cache-hit != 'true'
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        if: steps.marker.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Playwright system dependencies
        if: steps.marker.outputs.cache-hit != 'true'
        run: playwright install-deps chromium

      - name: Install Playwright browser (skip on cache hit)
        if: steps.marker.outputs.cache-hit != 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium

      - name: Run De Dagkrant
        if: steps.marker.outputs.cache-hit != 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TARGET_EMAIL: ${{ secrets.TARGET_EMAIL }}
          KINDLE_EMAIL: ${{ secrets.KINDLE_EMAIL }}
          SMTP_SERVER: smtp.gmail.com
          SMTP_PORT: '587'
        run: cd src && python main.py

      # Markeer pas NA een geslaagde verzending. Faalt de run, dan blijft de
      # markering uit en kan een volgende trigger het opnieuw proberen.
      - name: Schrijf dagmarkering
        if: steps.marker.outputs.cache-hit != 'true' && success()
        run: date > .sent-marker

      - name: Bewaar dagmarkering
        if: steps.marker.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: .sent-marker
          key: dagkrant-sent-${{ steps.date.outputs.today }}

      - name: Al verstuurd vandaag — overgeslagen
        if: steps.marker.outputs.cache-hit == 'true'
        run: echo "Editie van ${{ steps.date.outputs.today }} is vandaag al verstuurd. Run overgeslagen."
