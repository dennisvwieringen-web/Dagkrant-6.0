name: De Dagkrant - Nieuwsbundel

# ─────────────────────────────────────────────────────────────────────────────
# BEZORGING OM ~16:00 CEST
#
# PRIMAIRE TRIGGER: externe cron-dienst (cron-job.org) die om 16:00 Europe/Amsterdam
# de GitHub-API `workflow_dispatch` aanroept. Die start binnen seconden — GEEN
# GitHub-wachtrij. Dit is de betrouwbare, stipte route. Zomer-/wintertijd regelt
# cron-job.org automatisch via de tijdzone-instelling.
#
# ACHTERVANG: de `schedule`-cron hieronder. GitHub draait scheduled-cron op
# best-effort basis en stelt 'm vaak uren uit, dus dit is BEWUST een late vangnet
# (~17:00 CEST), puur voor het geval de externe trigger een keer uitvalt.
#
# DUBBEL-VERZENDING WORDT VOORKOMEN: een dagmarkering in de Actions-cache zorgt
# dat de eerste geslaagde run van de dag verstuurt en de markering zet; elke
# latere run (bv. de late achtervang-cron) ziet de markering en slaat het over.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # ACHTERVANG ONLY — bewust laat (~17:00 CEST zomertijd). De stipte 16:00-trigger
    # komt van cron-job.org. Wintertijd (CET): zet dan op '0 16 * * 1,3,4,5'.
    - cron: '0 15 * * 1,3,4,5'
  workflow_dispatch:  # ← primaire trigger (cron-job.org) + handmatig

concurrency:
  group: dagkrant-edition
  cancel-in-progress: false

jobs:
  generate-dagkrant:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bepaal datum van vandaag (Europe/Amsterdam)
        id: date
        run: echo "today=$(TZ='Europe/Amsterdam' date +%F)" >> "$GITHUB_OUTPUT"

      - name: Herstel dagmarkering (al verstuurd vandaag?)
        id: marker
        uses: actions/cache/restore@v4
        with:
          path: .sent-marker
          key: dagkrant-sent-${{ steps.date.outputs.today }}

      - name: Set up Python
        if: steps.marker.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        if: steps.marker.outputs.cache-hit != 'true'
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        if: steps.marker.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Playwright system dependencies
        if: steps.marker.outputs.cache-hit != 'true'
        run: playwright install-deps chromium

      - name: Install Playwright browser (skip on cache hit)
        if: steps.marker.outputs.cache-hit != 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium

      - name: Run De Dagkrant
        if: steps.marker.outputs.cache-hit != 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TARGET_EMAIL: ${{ secrets.TARGET_EMAIL }}
          KINDLE_EMAIL: ${{ secrets.KINDLE_EMAIL }}
          SMTP_SERVER: smtp.gmail.com
          SMTP_PORT: '587'
        run: cd src && python main.py

      # Markeer pas NA een geslaagde verzending. Faalt de run, dan blijft de
      # markering uit en kan een volgende trigger het opnieuw proberen.
      - name: Schrijf dagmarkering
        if: steps.marker.outputs.cache-hit != 'true' && success()
        run: date > .sent-marker

      - name: Bewaar dagmarkering
        if: steps.marker.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: .sent-marker
          key: dagkrant-sent-${{ steps.date.outputs.today }}

      - name: Al verstuurd vandaag — overgeslagen
        if: steps.marker.outputs.cache-hit == 'true'
        run: echo "Editie van ${{ steps.date.outputs.today }} is vandaag al verstuurd. Run overgeslagen."
