name: De Dagkrant - Nieuwsbundel

on:
  schedule:
    # Maandag, woensdag, donderdag, vrijdag om 16:00 CEST (zomertijd, UTC+2) = 14:00 UTC
    # Wintertijd (CET, UTC+1): 14:00 UTC = 15:00 CET — pas dan aan naar '0 15 * * 1,3,4,5'
    - cron: '0 14 * * 1,3,4,5'
  workflow_dispatch:  # Handmatige trigger mogelijk

jobs:
  generate-dagkrant:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Playwright system dependencies
        run: playwright install-deps chromium

      - name: Install Playwright browser (skip on cache hit)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium

      - name: Run De Dagkrant
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TARGET_EMAIL: ${{ secrets.TARGET_EMAIL }}
          KINDLE_EMAIL: ${{ secrets.KINDLE_EMAIL }}
          SMTP_SERVER: smtp.gmail.com
          SMTP_PORT: '587'
        run: cd src && python main.py
