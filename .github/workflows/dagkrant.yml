name: De Dagkrant - Nieuwsbundel

on:
  schedule:
    # Maandag, woensdag, donderdag, vrijdag, doel: ~16:00 CEST (zomertijd, UTC+2).
    # BEWUST op 13:48 UTC i.p.v. 14:00: GitHub stelt cron-runs op het hele uur (:00)
    # het sterkst uit ("high load times include the start of every hour" — GitHub docs).
    # Een oneven minuut net vóór het doeluur valt buiten de piek en landt veel
    # dichter bij 16:00. GEEN garantie — voor exact 16:00: externe workflow_dispatch-trigger.
    # Wintertijd (CET, UTC+1): zet dan op '48 14 * * 1,3,4,5' (= ~15:48 CET-doel naar 16:00).
    - cron: '48 13 * * 1,3,4,5'
  workflow_dispatch:  # Handmatige trigger mogelijk

jobs:
  generate-dagkrant:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Playwright system dependencies
        run: playwright install-deps chromium

      - name: Install Playwright browser (skip on cache hit)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium

      - name: Run De Dagkrant
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TARGET_EMAIL: ${{ secrets.TARGET_EMAIL }}
          KINDLE_EMAIL: ${{ secrets.KINDLE_EMAIL }}
          SMTP_SERVER: smtp.gmail.com
          SMTP_PORT: '587'
        run: cd src && python main.py
