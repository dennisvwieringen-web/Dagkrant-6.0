name: De Dagkrant - Nieuwsbundel

# ─────────────────────────────────────────────────────────────────────────────
# RICHTTIJD: KRANT KLAAR OM 15:00 CEST
#
# PRIMAIRE TRIGGER: een Windows Taakplanner-taak ("Dagkrant-1500") op de pc van
# Dennis roept om 14:30 (ma/wo/do/vr) via run_dagkrant.ps1 de GitHub-API
# `workflow_dispatch` aan. Die start binnen seconden — GEEN GitHub-wachtrij — en
# de krant wordt vervolgens HIER IN DE CLOUD opgehaald, vertaald, gerenderd en
# gemaild. De trigger staat op 14:30 (en niet 15:00) omdat de cloud-run zelf
# enkele tot ~tientallen minuten kost (vooral het vertalen); zo is de krant rond
# de richttijd 15:00 binnen. De pijplijn kan NIET lokaal draaien: dat (werk)-
# netwerk blokkeert de mailpoorten (IMAP 993 / SMTP 587); alleen HTTPS (443)
# werkt, genoeg om deze cloud-run aan te sturen. Authenticatie hergebruikt het
# token uit Git Credential Manager (geen aparte PAT). Voorwaarde: pc aan +
# ingelogd om 14:30 — geldt, want de krant wordt op het werk geprint.
#
# ACHTERVANG: de `schedule`-cron hieronder. GitHub draait scheduled-cron op
# best-effort basis en stelt 'm vaak uren uit (geobserveerd: 18:33 CEST), dus
# dit is BEWUST een late vangnet voor dagen dat de pc om 14:30 uit stond.
#
# GEEN DUBBELE VERZENDING: de dagmarkering in de Actions-cache (zie hieronder)
# zorgt dat alleen de EERSTE geslaagde run van de dag verstuurt. Op een normale
# dag verstuurt de 14:30-dispatch en zet de markering; de late `schedule`-cron
# ziet de cache-hit en slaat alles over. Beide triggers draaien dezelfde
# workflow, dus de cache geldt voor allebei.
#
# MAGAZINE-MODUS (workflow_dispatch met mode=magazine): een handmatige,
# ad-hoc bundel over een vast datumbereik (bv. "alle Google-nieuwsbrieven van
# juni"), i.p.v. de dagelijkse 24-uurs editie. Draait via dezelfde workflow en
# hetzelfde main.py, maar negeert de dagmarkering volledig — schrijft 'm niet
# (zodat de normale dagkrant later gewoon nog verstuurt) en slaat 'm niet over
# (zodat een magazine ook werkt op een dag dat de dagkrant al is verstuurd).
# ─────────────────────────────────────────────────────────────────────────────

'on':
  schedule:
    # ACHTERVANG — bewust laat (~17:00 CEST zomertijd). De stipte 14:30-trigger
    # komt van de lokale Taakplanner via workflow_dispatch. Wintertijd (CET):
    # zet dan op '0 16 * * 1,3,4,5'.
    - cron: '0 8 * * 0,1,2,3,4,5,6'
  # Primaire trigger: lokale Taakplanner, dashboard en handmatige GitHub-run.
  # Apart gehouden van inline commentaar zodat GitHub hem eenduidig registreert.
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modus'
        required: false
        default: 'dagkrant'
        type: choice
        options:
          - dagkrant
          - magazine
      sender_filter:
        description: 'Magazine: afzender, onderwerp of label (optioneel)'
        required: false
        default: ''
      date_from:
        description: 'Magazine: vanaf datum (YYYY-MM-DD)'
        required: false
        default: ''
      date_to:
        description: 'Magazine: tot datum (YYYY-MM-DD)'
        required: false
        default: ''
      title:
        description: 'Magazine: titel op de cover (optioneel)'
        required: false
        default: ''

concurrency:
  group: dagkrant-edition
  cancel-in-progress: false

jobs:
  generate-dagkrant:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bepaal datum van vandaag (Europe/Amsterdam)
        id: date
        run: echo "today=$(TZ='Europe/Amsterdam' date +%F)" >> "$GITHUB_OUTPUT"

      - name: Herstel dagmarkering (al verstuurd vandaag?)
        id: marker
        uses: actions/cache/restore@v4
        with:
          path: .sent-marker
          key: dagkrant-sent-${{ steps.date.outputs.today }}

      # Verzonden-administratie: message-id's van mails die al in een eerdere
      # editie zaten. Nodig omdat het terugkijkvenster 72 uur is (laat-gelabelde
      # mails komen alsnog mee) — zonder deze administratie zou elke mail drie
      # dagen achter elkaar in de krant staan. De key is per run uniek zodat de
      # save-stap altijd een verse snapshot wegschrijft; restore-keys pakt de
      # meest recente. Magazine-runs gebruiken dit niet (main.py negeert het).
      - name: Herstel verzonden-administratie (72u-venster)
        if: steps.marker.outputs.cache-hit != 'true' && github.event.inputs.mode != 'magazine'
        uses: actions/cache/restore@v4
        with:
          path: seen_ids.json
          key: dagkrant-seen-${{ github.run_id }}
          restore-keys: |
            dagkrant-seen-

      - name: Set up Python
        if: steps.marker.outputs.cache-hit != 'true' || github.event.inputs.mode == 'magazine'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        if: steps.marker.outputs.cache-hit != 'true' || github.event.inputs.mode == 'magazine'
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        if: steps.marker.outputs.cache-hit != 'true' || github.event.inputs.mode == 'magazine'
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Playwright system dependencies
        if: steps.marker.outputs.cache-hit != 'true' || github.event.inputs.mode == 'magazine'
        run: playwright install-deps chromium

      - name: Install Playwright browser (skip on cache hit)
        if: steps.playwright-cache.outputs.cache-hit != 'true' && (steps.marker.outputs.cache-hit != 'true' || github.event.inputs.mode == 'magazine')
        run: playwright install chromium

      - name: Run De Dagkrant
        if: steps.marker.outputs.cache-hit != 'true' || github.event.inputs.mode == 'magazine'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TARGET_EMAIL: ${{ secrets.TARGET_EMAIL }}
          KINDLE_EMAIL: ${{ secrets.KINDLE_EMAIL }}
          SMTP_SERVER: smtp.gmail.com
          SMTP_PORT: '587'
          MODE: ${{ github.event.inputs.mode || 'dagkrant' }}
          MAGAZINE_SENDER: ${{ github.event.inputs.sender_filter }}
          MAGAZINE_FROM: ${{ github.event.inputs.date_from }}
          MAGAZINE_TO: ${{ github.event.inputs.date_to }}
          MAGAZINE_TITLE: ${{ github.event.inputs.title }}
          SEEN_IDS_FILE: ${{ github.workspace }}/seen_ids.json
        run: cd src && python main.py

      # Markeer pas NA een geslaagde verzending. Faalt de run, dan blijft de
      # markering uit en kan een volgende trigger het opnieuw proberen.
      - name: Schrijf dagmarkering
        if: success() && github.event.inputs.mode != 'magazine' && steps.marker.outputs.cache-hit != 'true'
        run: date > .sent-marker

      - name: Bewaar dagmarkering
        if: success() && github.event.inputs.mode != 'magazine' && steps.marker.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .sent-marker
          key: dagkrant-sent-${{ steps.date.outputs.today }}

      # Bewaar de bijgewerkte verzonden-administratie (main.py schrijft die na
      # een geslaagde verzending). hashFiles-check: sla niets op als het bestand
      # er niet is (bv. run zonder nieuwsbrieven vóór de eerste editie).
      - name: Bewaar verzonden-administratie
        if: success() && github.event.inputs.mode != 'magazine' && steps.marker.outputs.cache-hit != 'true' && hashFiles('seen_ids.json') != ''
        uses: actions/cache/save@v4
        with:
          path: seen_ids.json
          key: dagkrant-seen-${{ github.run_id }}

      - name: Al verstuurd vandaag — overgeslagen
        if: steps.marker.outputs.cache-hit == 'true' && github.event.inputs.mode != 'magazine'
        run: echo "Editie van ${{ steps.date.outputs.today }} is vandaag al verstuurd. Run overgeslagen."
